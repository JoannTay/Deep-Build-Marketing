<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Build Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1731;
    --surface: rgba(11,23,49,0.72);
    --border: rgba(250,204,21,0.08);
    --text: #FBFDF0;
    --text-dim: rgba(251,253,240,0.5);
    --accent: #FACC15;
    --accent-glow: rgba(250,204,21,0.12);
    --card-hover: rgba(21,39,80,0.85);
    --blue: #2563EB;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Full-page blurred bg ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('bg.png') center center / cover no-repeat;
    filter: blur(30px) brightness(0.25) saturate(1.3);
    transform: scale(1.2);
  }
  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at center top, rgba(11,23,49,0.25) 0%, rgba(11,23,49,0.75) 100%);
  }

  /* ── Page wrapper ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Hero ── */
  .hero {
    width: 100%;
    text-align: center;
    position: relative;
  }

  .hero-image {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    aspect-ratio: 1 / 1;
    overflow: hidden;
  }

  .hero-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 30%, rgba(0,0,0,0.6) 55%, rgba(0,0,0,0.2) 75%, transparent 92%);
    mask-image: linear-gradient(to bottom, black 0%, black 30%, rgba(0,0,0,0.6) 55%, rgba(0,0,0,0.2) 75%, transparent 92%);
  }

  .hero-text {
    position: relative;
    margin-top: -90px;
    z-index: 2;
    padding: 0 24px;
  }

  .hero-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    line-height: 1.3;
  }

  .hero-text p {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.4px;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  /* ── Social icons ── */
  .social-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .social-dot {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: rgba(251,253,240,0.55);
    transition: all 0.3s ease;
  }
  .social-dot:hover { transform: scale(1.12); }
  .social-dot.sd-fb:hover  { color: #1877f2; border-color: #1877f2; background: rgba(24,119,242,0.12); }
  .social-dot.sd-ig:hover  { color: #e1306c; border-color: #e1306c; background: rgba(225,48,108,0.12); }
  .social-dot.sd-wa:hover  { color: #25d366; border-color: #25d366; background: rgba(37,211,102,0.12); }
  .social-dot.sd-xhs:hover { border-color: #ff2442; background: rgba(255,36,66,0.12); }
  .social-dot.sd-xhs img {
    width: 22px; height: 22px;
    object-fit: contain;
    opacity: 0.55;
    transition: opacity 0.3s ease;
  }
  .social-dot.sd-xhs:hover img { opacity: 1; }

  /* ── Link Cards ── */
  .links {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 40px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }
  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .link-card:hover, .link-card:active {
    background: var(--card-hover);
    border-color: rgba(250,204,21,0.25);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .link-card:hover::before, .link-card:active::before { opacity: 1; }

  /* Coming soon */
  .link-card.coming-soon { cursor: default; opacity: 0.6; }
  .link-card.coming-soon:hover, .link-card.coming-soon:active {
    transform: none; box-shadow: none; background: var(--surface); border-color: var(--border);
  }
  .link-card.coming-soon:hover::before, .link-card.coming-soon:active::before { opacity: 0; }

  .coming-badge {
    position: relative; z-index: 1;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent);
    background: rgba(250,204,21,0.1);
    padding: 3px 10px; border-radius: 20px;
    border: 1px solid rgba(250,204,21,0.15);
    flex-shrink: 0;
  }

  .link-icon {
    position: relative; z-index: 1;
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .link-info { position: relative; z-index: 1; flex: 1; min-width: 0; }
  .link-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .link-info span { font-size: 12px; color: var(--text-dim); }
  .link-arrow {
    position: relative; z-index: 1;
    color: var(--text-dim);
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .link-card:hover .link-arrow { color: var(--accent); transform: translateX(3px); }

  .icon-portfolio { background: rgba(250,204,21,0.1); color: var(--accent); }
  .icon-pricing   { background: rgba(37,99,235,0.15); color: var(--blue); }
  .icon-video     { background: rgba(250,204,21,0.1); color: var(--accent); }
  .icon-website   { background: rgba(37,99,235,0.15); color: var(--blue); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 0 24px 40px;
  }
  .footer .tagline {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.45;
  }

  /* ══════════════════════════════
     DESKTOP — wider, more spacious
     ══════════════════════════════ */
  @media (min-width: 768px) {
    .hero-image {
      max-width: 520px;
      aspect-ratio: 4 / 3;
    }
    .hero-text h1 {
      font-size: 32px;
    }
    .hero-text p {
      font-size: 15px;
    }
    .social-dot {
      width: 42px; height: 42px;
    }
    .links {
      max-width: 560px;
      gap: 14px;
    }
    .link-card {
      padding: 22px 26px;
    }
    .link-info h3 { font-size: 16px; }
    .link-info span { font-size: 13px; }
  }

  /* Extra-wide desktop */
  @media (min-width: 1200px) {
    .hero-image {
      max-width: 480px;
      aspect-ratio: 4 / 3;
    }
    .hero-text {
      margin-top: -80px;
    }
    .hero-text h1 {
      font-size: 36px;
    }
    .links {
      max-width: 600px;
    }
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .hero-image    { animation: fadeIn 0.8s ease both; }
  .hero-text     { animation: fadeUp 0.6s ease 0.2s both; }
  .social-row    { animation: fadeUp 0.5s ease 0.35s both; }
  .link-card:nth-child(1) { animation: fadeUp 0.5s ease 0.4s both; }
  .link-card:nth-child(2) { animation: fadeUp 0.5s ease 0.48s both; }
  .link-card:nth-child(3) { animation: fadeUp 0.5s ease 0.56s both; }
  .link-card:nth-child(4) { animation: fadeUp 0.5s ease 0.64s both; }
  .footer .tagline { animation: fadeUp 0.5s ease 0.7s both; }

  /* grain */
  .grain {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 999; opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 180px;
  }
</style>
</head>
